<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 520 120" width="520" height="120"
     role="img" aria-label="TUPA Digital — Municipalidad Distrital de Nuevo Chimbote">

  <!-- Escudo (fondo transparente, cuadrado) -->
  <image href="/escudo_hero.png" x="4" y="4" width="112" height="112"
         preserveAspectRatio="xMidYMid meet"/>

  <!-- Línea divisoria roja -->
  <rect x="126" y="18" width="3" height="84" rx="1.5" fill="#C62828"/>

  <!-- TUPA DIGITAL en una línea -->
  <text x="142" y="66"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="46" font-weight="900" fill="#0D2644" letter-spacing="-1.5">
    TUPA <tspan fill="#C62828">DIGITAL</tspan>
  </text>

  <!-- Línea separadora fina -->
  <rect x="142" y="74" width="370" height="1.5" rx="1" fill="#E2E8F0"/>

  <!-- Subtítulo -->
  <text x="142" y="93"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="500" fill="#555555" letter-spacing="0.3">
    Municipalidad Distrital de Nuevo Chimbote
  </text>

</svg>
