<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 800 220" width="800" height="220" role="img"
     aria-label="TUPA Digital — Municipalidad Distrital de Nuevo Chimbote">

  <!-- Background -->
  <rect width="800" height="220" fill="white"/>

  <!-- Escudo (embedded via image reference) -->
  <image href="/logo.png" x="10" y="10" width="200" height="200" preserveAspectRatio="xMidYMid meet"/>

  <!-- Red vertical divider -->
  <rect x="225" y="40" width="3" height="140" fill="#C62828" rx="1.5"/>

  <!-- Digital icon circle -->
  <circle cx="266" cy="110" r="32" fill="#C62828"/>
  <!-- Document icon inside circle -->
  <rect x="255" y="95" width="18" height="23" rx="2" fill="white"/>
  <rect x="258" y="101" width="12" height="2" rx="1" fill="#C62828"/>
  <rect x="258" y="106" width="12" height="2" rx="1" fill="#C62828"/>
  <rect x="258" y="111" width="8"  height="2" rx="1" fill="#C62828"/>
  <!-- Network dot -->
  <circle cx="280" cy="95" r="4" fill="white"/>
  <circle cx="280" cy="125" r="4" fill="white"/>
  <line x1="274" y1="98" x2="280" y2="99" stroke="white" stroke-width="1.5"/>
  <line x1="274" y1="116" x2="280" y2="121" stroke="white" stroke-width="1.5"/>

  <!-- TUPA DIGITAL text -->
  <text x="315" y="105"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="900" fill="#0D2644" letter-spacing="-1">TUPA</text>
  <text x="315" y="162"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="900" fill="#C62828" letter-spacing="-1">DIGITAL</text>

  <!-- Subtitle -->
  <text x="315" y="185"
        font-family="'Segoe UI', 'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="14.5" font-weight="500" fill="#555555" letter-spacing="0.3">Municipalidad Distrital de Nuevo Chimbote</text>

  <!-- Thin red accent line under TUPA -->
  <rect x="315" y="112" width="460" height="2" fill="#E8EAED" rx="1"/>
</svg>
